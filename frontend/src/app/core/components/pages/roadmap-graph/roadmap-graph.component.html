<ngx-graph
  [view]="[800, 500]"
  [links]="links"
  [nodes]="nodes"
  [curve]="curve"
  [layout]="layout"
  [layoutSettings]="layoutSettings"
  [enableZoom]="true"
  [autoZoom]="true"
  [curve]="curve"
>


<ng-template #defsTemplate>
  <svg:marker
    id="arrow"
    viewBox="0 -5 10 10"
    refX="8"
    refY="0"
    markerWidth="4"
    markerHeight="4"
    orient="auto"
  >
    <svg:path d="M0,-5L10,0L0,5" class="arrow-head" />
  </svg:marker>
</ng-template>


<ng-template #nodeTemplate let-node>
  <svg:g
    class="node"
    xmlns="http://www.w3.org/2000/xhtml"
    width="150"
    height="100"
  >
    <svg:foreignObject width="150" height="100">
      <xhtml:div
        class="cardContainer"
        xmlns="http://www.w3.org/1999/xhtml"
        [ngStyle]="getStyles(node)"
      >
        <label class="name">{{node.label}}</label>
        <label>{{node.data.role}}</label>
        <label>{{node.data.office}}</label>
      </xhtml:div>
    </svg:foreignObject>
  </svg:g>
</ng-template>


<ng-template #linkTemplate let-link>
  <svg:g class="edge">
    <svg:path
      class="line"
      stroke-width="5"
      marker-end="url(#arrow)"
    ></svg:path>
    <svg:text class="edge-label" text-anchor="middle">
      <textPath
        class="text-path"
        [attr.href]="'#' + link.id"
        [style.dominant-baseline]="link.dominantBaseline"
        startOffset="50%"
      >
      {{link.label}}
      </textPath>
    </svg:text>
  </svg:g>
  <svg:g
    class="linkMidpoint"
    *ngIf="link.midPoint"
    [attr.transform]="'translate(' + (link.midPoint.x) + ',' + (link.midPoint.y) + ')'"
  >
    <ellipse rx="30" ry="10" />
    <svg:text alignment-baseline="central"></svg:text>
  </svg:g>
</ng-template>
</ngx-graph>
